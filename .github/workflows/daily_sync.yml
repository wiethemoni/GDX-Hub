name: Daily Market Data Sync

on:
  schedule:
    # 매일 UTC 21:00 (한국 시간 오전 6시 - 미 증시 마감 후) 실행
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동으로 실행하고 싶을 때 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance supabase python-dotenv pandas xgboost joblib scikit-learn

    - name: Run Scraper and AI Prediction
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      run: python scripts/scraper.py
